<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Your Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2d3748; margin: 0; font-size: 24px; }
        .content { color: #4a5568; line-height: 1.6; }
        .otp-box { background-color: #fff5f5; padding: 20px; text-align: center; border-radius: 6px; margin: 25px 0; font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #c53030; border: 1px solid #feb2b2; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ByteChat</h1>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>We received a request to reset your password. Use the code below to set a new one:</p>
            <div class="otp-box" th:text="${otp}">123456</div>
            <p>This code will expire in 15 minutes. If you didn't request this, you can safely ignore this email.</p>
            <p>Best regards,<br/>The ByteChat Team</p>
        </div>
        <div class="footer">
            &copy; 2024 ByteChat. All rights reserved.
        </div>
    </div>
</body>
</html>
