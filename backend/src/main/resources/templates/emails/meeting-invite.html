<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Meeting Started</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2d3748; margin: 0; font-size: 24px; }
        .content { color: #4a5568; line-height: 1.6; }
        .meeting-box { background-color: #ebf8ff; padding: 20px; border-radius: 6px; margin: 25px 0; border-left: 4px solid #3182ce; }
        .meeting-title { font-weight: bold; color: #2b6cb0; font-size: 18px; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ByteChat</h1>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>
                <strong th:text="${inviterName}">Someone</strong> started a meeting for channel
                <strong th:text="${channelName}">general</strong> in
                <strong th:text="${workspaceName}">Workspace</strong>.
            </p>
            <div class="meeting-box">
                <div class="meeting-title" th:text="${meetingTitle}">Daily Standup</div>
                <p>Open ByteChat and join from the channel notifications or live meetings list.</p>
            </div>
            <p>Best regards,<br/>The ByteChat Team</p>
        </div>
        <div class="footer">
            &copy; 2024 ByteChat. All rights reserved.
        </div>
    </div>
</body>
</html>
