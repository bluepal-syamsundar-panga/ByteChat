spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bytechat_test}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false
  hikari:
    maximum-pool-size: 5
    minimum-idle: 1
    idle-timeout: 30000
    connection-timeout: 20000

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 3600000 # 1 hour for tests
  refresh-expiration: 86400000 # 24 hours for tests

logging:
  level:
    com.bytechat: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
