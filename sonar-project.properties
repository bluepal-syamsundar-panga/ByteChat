sonar.projectKey=bytechat
sonar.projectName=ByteChat
sonar.sourceEncoding=UTF-8

# Scan both applications from the repo root.
sonar.sources=backend/src/main/java,backend/src/main/resources,frontend/src
sonar.tests=backend/src/test/java

# Java analysis inputs.
sonar.java.source=21
sonar.java.binaries=backend/target/classes
sonar.junit.reportPaths=backend/target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Keep Sonar focused on maintained source, not generated or local runtime files.
sonar.exclusions=\
backend/bin/**,\
backend/target/**,\
backend/uploads/**,\
frontend/dist/**,\
frontend/node_modules/**,\
performance-tests/**,\
**/*.min.js

# Frontend currently has no automated coverage wired in.
sonar.coverage.exclusions=\
frontend/src/**,\
backend/src/main/resources/**,\
backend/src/main/java/com/bytechat/config/**,\
backend/src/main/java/com/bytechat/dto/**,\
backend/src/main/java/com/bytechat/entity/**
